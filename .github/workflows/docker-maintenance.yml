# =============================================================================
# Docker Maintenance — Auto-merge Dependabot PRs
# =============================================================================
# When Dependabot opens a PR bumping a base image inside src/*/Dockerfile or
# an upstream image reference inside docker-compose*.yml, this workflow
# auto-approves and merges it (after validation passes), which then triggers
# release.yml to cut a new release reflecting the dependency update.
# =============================================================================

name: 🔧 Docker Maintenance

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'src/**/Dockerfile'
      - 'docker-compose*.yml'

permissions:
  contents: write
  pull-requests: write

jobs:
  maintenance:
    name: Auto-merge Dependabot PRs
    uses: bauer-group/automation-templates/.github/workflows/docker-maintenance-dependabot.yml@main
    with:
      merge-method: 'squash'
      auto-approve: true
    secrets: inherit
